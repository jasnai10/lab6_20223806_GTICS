<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administración de Mesas - Oktoberfest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div> <!-- Incluye tu navbar -->

<div class="container mt-4">
    <h2 class="mb-3">Administración de Mesas</h2>

    <!-- Contadores -->
    <div class="row mb-3">
        <div class="col-md-6">
            <div class="alert alert-success">
                Mesas libres: <span th:text="${libres}">0</span>
            </div>
        </div>
        <div class="col-md-6">
            <div class="alert alert-danger">
                Mesas ocupadas: <span th:text="${ocupadas}">0</span>
            </div>
        </div>
    </div>

    <!-- Tabla de mesas -->
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Número</th>
            <th>Capacidad</th>
            <th>Disponible</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="mesa : ${mesas}">
            <td th:text="${mesa.id}"></td>
            <td th:text="${mesa.numero}"></td>
            <td>
                <form th:action="@{'/admin/mesas/editar/' + ${mesa.id}}" method="post" class="d-flex">
                    <input type="number" name="capacidad" th:value="${mesa.capacidad}"
                           class="form-control form-control-sm me-2" min="1" max="4">
                    <button type="submit" class="btn btn-warning btn-sm">Actualizar</button>
                </form>
            </td>
            <td>
                <span th:text="${mesa.disponible ? 'Sí' : 'No'}"></span>
            </td>
            <td>
                <form th:action="@{'/admin/mesas/liberar/' + ${mesa.id}}" method="post">
                    <button type="submit" class="btn btn-success btn-sm"
                            th:disabled="${mesa.disponible}">
                        Liberar
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
