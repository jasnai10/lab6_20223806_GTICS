<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Asignaciones Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace = "fragments/navbar.html :: navbar"></div>

<div class="container mt-5">
    <h2 class="mb-4">Solicitudes de Asignación</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>Usuario</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${solicitudes}">
                    <td th:text="${s.usuario.nombre}"></td>
                    <td>
                        <form th:action="@{'/admin/asignaciones/asignar/' + ${s.id}}" method="post" class="d-flex">
                            <select name="idCancion" class="form-select me-2">
                                <option th:each="c : ${canciones}" th:value="${c.id}" th:text="${c.titulo}"></option>
                            </select>
                            <button type="submit" class="btn btn-primary">Asignar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
