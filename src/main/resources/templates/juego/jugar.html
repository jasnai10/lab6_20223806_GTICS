<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Adivina la Canción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace = "fragments/navbar.html :: navbar"></div>

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            🎶 Adivina la Canción Criolla
        </div>
        <div class="card-body">
            <p><b>Intentos:</b> <span th:text="${asignacion.intentos}"></span></p>

            <form action="/juego/intentar" method="post" class="d-flex">
                <input type="text" name="intento" class="form-control me-2" placeholder="Escribe tu intento..." required>
                <button type="submit" class="btn btn-success">Probar</button>
            </form>

            <div class="mt-3">
                <p class="alert alert-info" th:if="${resultado}" th:text="${resultado}"></p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
