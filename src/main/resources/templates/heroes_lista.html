<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Heroes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace = "fragments/navbar.html :: navbar"></div>

<div class="container mt-4">
    <h2 class="mb-4 text-center">Héroes Navales</h2>
    <div class="row">
        <div class="col-md-4" th:each="heroe : ${heroes}">
            <div class="card mb-4 shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${heroe.nombre}"></h5>
                    <p class="card-text text-muted" th:text="${heroe.descripcion}"></p>
                    <p class="card-text"><small class="text-primary" th:text="${heroe.pais}"></small></p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
